# --- Backend (Obrigatório para dual_kawase) ---
backend = "glx";
vsync = true;
glx-no-stencil = true;

# --- Blur (Dual Kawase) ---
blur-method = "dual_kawase";
blur-strength = 5; # Ajuste de 1 a 20 (5 é médio)
blur-background = false;
blur-background-frame = true; # Aplica blur às bordas
blur-background-fixed = false; # Evita lag em janelas móveis

# --- Transparência e Opacidade ---
# Opacidade de janelas inativas
inactive-opacity = 0.95;
# Regras de opacidade específicas
opacity-rule = [
  "90:class_g = 'URxvt'",
  "85:class_g = 'Alacritty'"
];

# --- Transições Suaves (Fade) ---
fading = true;
fade-in-step = 0.02;
fade-out-step = 0.02;
fade-delta = 5;

# --- Sombras ---
shadow = true;
shadow-radius = 12;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-opacity = 0.5;
# Exclui sombras em notificações e dock
shadow-exclude = [
  "name *= 'Notification'",
  "class_g = 'Polybar'",
  "class_g = 'plank'",
  "class_g = 'brave'"
];

# --- Desempenho e Compatibilidade ---
# Marca janelas do WM como focadas
mark-wmwin-focused = true;
mark-ovredir-focused = true;
# Detecta propriedades de janelas
detect-rounded-corners = true;
detect-client-opacity = true;
# Evita problemas com alguns drivers
unredir-if-possible = true;

# --- Regras para Tipos de Janela ---
wintypes: {
  tooltip = { fade = true; shadow = true; opacity = 0.9; };
  popup_menu = { fade = true; shadow = true; opacity = 0.9; };
  dropdown_menu = { fade = true; shadow = true; opacity = 0.9; };
  dock = { shadow = false; };
  dnd = { shadow = false; };
};  

 
